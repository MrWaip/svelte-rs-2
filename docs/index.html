<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="theme-color" content="#0e0e0e" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./playground.css" />
        <title>Rust Svelte Playground</title>

        <script type="importmap">
            {
                "imports": {
                    "codemirror": "https://esm.sh/codemirror@6.0.1?external=@codemirror/state,@codemirror/view,@codemirror/commands,@codemirror/language,@codemirror/search,@codemirror/autocomplete,@codemirror/lint",
                    "@codemirror/state": "https://esm.sh/@codemirror/state@6.4.1",
                    "@codemirror/view": "https://esm.sh/@codemirror/view@6.26.3?external=@codemirror/state,style-mod,w3c-keyname",
                    "@codemirror/language": "https://esm.sh/@codemirror/language@6.10.1?external=@codemirror/state,@codemirror/view,@lezer/common,@lezer/highlight,@lezer/lr,style-mod",
                    "@codemirror/lang-html": "https://esm.sh/@codemirror/lang-html@6.4.9?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/autocomplete,@codemirror/lang-css,@codemirror/lang-javascript,@lezer/common,@lezer/highlight,@lezer/html",
                    "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.2?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/autocomplete,@codemirror/lint,@lezer/common,@lezer/highlight,@lezer/javascript",
                    "@codemirror/lang-css": "https://esm.sh/@codemirror/lang-css@6.2.1?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/autocomplete,@lezer/common,@lezer/highlight,@lezer/css",
                    "@codemirror/lint": "https://esm.sh/@codemirror/lint@6.5.0?external=@codemirror/state,@codemirror/view,crelt",
                    "@codemirror/merge": "https://esm.sh/@codemirror/merge@6.6.2?external=@codemirror/state,@codemirror/view,@codemirror/language,style-mod",
                    "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.5.0?external=@codemirror/state,@codemirror/view,@codemirror/language,@lezer/common",
                    "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.16.0?external=@codemirror/state,@codemirror/view,@codemirror/language,@lezer/common",
                    "@codemirror/search": "https://esm.sh/@codemirror/search@6.5.6?external=@codemirror/state,@codemirror/view,crelt",
                    "@lezer/highlight": "https://esm.sh/@lezer/highlight@1.2.0?external=@lezer/common",
                    "@lezer/common": "https://esm.sh/@lezer/common@1.2.1",
                    "@lezer/lr": "https://esm.sh/@lezer/lr@1.4.0?external=@lezer/common",
                    "@lezer/html": "https://esm.sh/@lezer/html@1.3.10?external=@lezer/common,@lezer/highlight,@lezer/lr",
                    "@lezer/javascript": "https://esm.sh/@lezer/javascript@1.4.17?external=@lezer/common,@lezer/highlight,@lezer/lr",
                    "@lezer/css": "https://esm.sh/@lezer/css@1.1.8?external=@lezer/common,@lezer/highlight,@lezer/lr",
                    "style-mod": "https://esm.sh/style-mod@4.1.2",
                    "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
                    "crelt": "https://esm.sh/crelt@1.0.6",
                    "svelte/compiler": "https://esm.sh/svelte@5.53.9/compiler"
                }
            }
        </script>
    </head>
    <body>
        <div class="app" data-theme="dark" data-mobile-tab="source">
            <header class="topbar">
                <div class="brand">
                    <span class="logo" aria-hidden="true"></span>
                    <h1>Rust Svelte</h1>
                    <span class="brand-version" data-version>v0.4.2</span>
                </div>
                <nav class="mode-tabs" role="tablist" aria-label="Compilation mode">
                    <button data-mode="component" class="active" role="tab">Component</button>
                    <button data-mode="module" role="tab">Module</button>
                </nav>
                <div class="actions">
                    <button class="icon-btn" data-action="benchmark" aria-label="Load benchmark" title="Load benchmark">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    </button>
                    <button class="icon-btn" data-action="settings" aria-label="Settings" title="Compiler options">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </button>
                    <span class="actions-divider" aria-hidden="true"></span>
                    <button class="icon-btn" data-action="theme" aria-label="Toggle theme" title="Toggle theme">
                        <svg class="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        <svg class="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    </button>
                </div>
            </header>

            <nav class="mobile-tabs" role="tablist" aria-label="View">
                <button data-tab="source" class="active" role="tab">Source</button>
                <button data-tab="output" role="tab">Output</button>
                <button data-tab="diagnostics" role="tab">
                    Diagnostics
                    <span class="badge" data-mobile-diag-count="" hidden>0</span>
                </button>
            </nav>

            <main class="workspace">
                <section class="panel" data-panel="source">
                    <header class="panel-head">
                        <span class="panel-title">Svelte source</span>
                        <span class="chip muted" data-status="">warming up…</span>
                    </header>
                    <div id="source-editor" class="editor"></div>
                </section>

                <div class="workspace-resizer" data-resizer aria-label="Resize panels" role="separator" aria-orientation="vertical" tabindex="0"></div>

                <section class="panel" data-panel="output">
                    <header class="panel-head">
                        <span class="panel-title">Output diff</span>
                        <span class="chip parity" data-parity="" title="Parity status">—</span>
                        <span class="chip" data-svelte-perf="">svelte —</span>
                        <span class="chip" data-rust-perf="">rust —</span>
                        <span class="chip speedup" data-speedup="" hidden>—</span>
                    </header>
                    <div class="diff-labels" aria-hidden="true">
                        <span>Svelte JS</span>
                        <span>Rust WASM</span>
                    </div>
                    <div id="diff-editor" class="editor"></div>
                </section>
            </main>

            <aside class="diagnostics-panel" data-collapsed="true" aria-label="Diagnostics">
                <button class="diag-toggle" data-action="toggle-diagnostics" aria-expanded="false">
                    <span class="diag-toggle-label">Diagnostics</span>
                    <span class="diag-counts">
                        <span class="badge rust" data-rust-count="" hidden>0 rust</span>
                        <span class="badge svelte" data-svelte-count="" hidden>0 svelte</span>
                        <span class="badge muted" data-clean="" hidden>clean</span>
                    </span>
                    <span class="caret" aria-hidden="true">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
                    </span>
                </button>
                <div class="diag-body">
                    <div class="diag-list" data-diag-list>
                        <p class="diag-empty">No diagnostics.</p>
                    </div>
                </div>
            </aside>

            <div class="drawer-overlay" data-action="close-settings" aria-hidden="true"></div>

            <aside class="settings-drawer" data-open="false" aria-label="Compiler options">
                <header class="drawer-head">
                    <div class="drawer-head-row">
                        <h2>Compiler options</h2>
                        <button class="icon-btn" data-action="close-settings" aria-label="Close">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                    <span class="drawer-subtitle">svelte/compiler · v5.4.0</span>
                </header>
                <div class="preset-bar">
                    <span class="preset-label">Preset</span>
                    <div class="preset-chips" role="tablist">
                        <button class="preset-chip" data-preset="default" role="tab">
                            <svg class="preset-check" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
                            Default
                        </button>
                        <button class="preset-chip" data-preset="legacy" role="tab">
                            <svg class="preset-check" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
                            Legacy
                        </button>
                        <button class="preset-chip" data-preset="ssr" role="tab">
                            <svg class="preset-check" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
                            SSR
                        </button>
                        <span class="preset-chip" data-preset="custom" role="tab" aria-disabled="true">
                            <svg class="preset-check" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
                            Custom
                        </span>
                    </div>
                </div>
                <div class="drawer-body">
                    <fieldset data-section="output">
                        <legend>
                            <span class="legend-title">Output</span>
                            <span class="legend-count" data-section-count></span>
                            <span class="legend-mod" data-section-mod hidden></span>
                        </legend>
                        <label class="select">
                            <span>generate</span>
                            <select data-opt="generate">
                                <option value="client">client</option>
                                <option value="server">server</option>
                            </select>
                        </label>
                        <label class="select">
                            <span>css</span>
                            <select data-opt="css">
                                <option value="external">external</option>
                                <option value="injected">injected</option>
                            </select>
                        </label>
                        <label class="toggle"><input type="checkbox" data-opt="dev"> <span>dev</span></label>
                        <label class="toggle"><input type="checkbox" data-opt="hmr"> <span>hmr</span></label>
                        <label class="toggle"><input type="checkbox" data-opt="discloseVersion"> <span>discloseVersion</span></label>
                    </fieldset>
                    <fieldset data-component-only data-section="component">
                        <legend>
                            <span class="legend-title">Component</span>
                            <span class="legend-count" data-section-count></span>
                            <span class="legend-mod" data-section-mod hidden></span>
                        </legend>
                        <label class="toggle"><input type="checkbox" data-opt="runes" checked> <span>runes</span></label>
                        <label class="toggle"><input type="checkbox" data-opt="customElement"> <span>customElement</span></label>
                        <label class="toggle"><input type="checkbox" data-opt="preserveComments"> <span>preserveComments</span></label>
                        <label class="toggle"><input type="checkbox" data-opt="preserveWhitespace"> <span>preserveWhitespace</span></label>
                        <label class="text">
                            <span>name</span>
                            <input type="text" data-opt="name" placeholder="App">
                        </label>
                    </fieldset>
                </div>
                <footer class="drawer-foot">
                    <span class="drawer-foot-meta" data-overrides-count>0 overrides</span>
                    <button class="btn-ghost" data-action="reset-options">Reset</button>
                    <button class="btn-primary" data-action="close-settings">Apply &amp; close</button>
                </footer>
            </aside>

            <nav class="mobile-actions" aria-label="Quick actions">
                <button class="mobile-action mobile-action-primary" data-action="recompile">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    <span data-recompile-label>Recompile</span>
                </button>
                <button class="mobile-action" data-action="share" aria-label="Copy share link">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                </button>
            </nav>
        </div>

        <script type="module" src="./src/main.js"></script>
    </body>
</html>
