<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
            rel="stylesheet"
        />
        <title>Rust Svelte compiler preview</title>
    </head>
    <body>
        <div class="container">
            <div class="toolbar">
                <h1>Rust Svelte Compiler Demo</h1>
                <div class="toolbar-actions">
                    <button id="load-benchmark" class="btn" title="Load benchmark code">
                        Load benchmark
                    </button>
                    <button id="theme-toggle" class="btn btn-icon" title="Toggle theme">
                    </button>
                </div>
            </div>

            <div class="grid">
                <div class="editor-box">
                    <h2>
                        Svelte source
                        <br />
                        <span class="perf">&nbsp;</span>
                    </h2>
                    <div id="editor" class="editor"></div>
                </div>
                <div class="editor-box">
                    <h2>
                        Output diff
                        <span id="status"></span>
                        <br />
                        <span class="perf">
                            Rust: <span id="rust-perf"></span>
                            &middot;
                            Svelte: <span id="svelte-perf"></span>
                        </span>
                    </h2>
                    <div id="diff-editor" class="editor"></div>
                </div>
            </div>
        </div>

        <style>
            :root {
                --bg: #ffffff;
                --text: #1a1a1a;
                --toolbar-bg: #f0f0f0;
                --btn-bg: #e0e0e0;
                --btn-text: #1a1a1a;
                --btn-hover: #d0d0d0;
            }

            :root.dark {
                --bg: #1e1e1e;
                --text: #d4d4d4;
                --toolbar-bg: #2d2d2d;
                --btn-bg: #3c3c3c;
                --btn-text: #d4d4d4;
                --btn-hover: #505050;
            }

            * {
                margin: 0;
                padding: 0;
            }

            html body {
                font-family: "Space Mono", serif;
                font-weight: 400;
                font-style: normal;
                background: var(--bg);
                color: var(--text);
                transition: background 0.2s, color 0.2s;
            }

            .container {
                padding: 1rem;
                width: 100vw;
                height: 80vh;
                box-sizing: border-box;
            }

            .toolbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
            }

            .toolbar-actions {
                display: flex;
                gap: 0.5rem;
                align-items: center;
            }

            .btn {
                font-family: "Space Mono", serif;
                font-size: 14px;
                padding: 6px 14px;
                border: none;
                border-radius: 6px;
                background: var(--btn-bg);
                color: var(--btn-text);
                cursor: pointer;
                transition: background 0.15s;
            }

            .btn:hover {
                background: var(--btn-hover);
            }

            .btn-icon {
                font-size: 18px;
                padding: 6px 10px;
                line-height: 1;
            }

            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
                height: 100%;
                margin-top: 1rem;
            }

            .editor-box {
                display: flex;
                flex-direction: column;
            }

            .editor {
                height: 100%;
            }

            .perf {
                font-size: 18px;
            }

            @media (max-width: 768px) {
                .container {
                    height: auto;
                    min-height: 100vh;
                    padding: 0.5rem;
                }

                h1 {
                    font-size: 1.2rem;
                }

                h2 {
                    font-size: 0.9rem;
                }

                .toolbar {
                    flex-direction: column;
                    align-items: flex-start;
                }

                .grid {
                    grid-template-columns: 1fr;
                }

                .editor {
                    height: 50vh;
                }

                .perf {
                    font-size: 14px;
                }
            }
        </style>

        <script type="importmap">
            {
                "imports": {
                    "prettyMs": "https://cdn.jsdelivr.net/npm/pretty-ms@9.2.0/index.js",
                    "parse-ms": "https://cdn.jsdelivr.net/npm/parse-ms@4.0.0/index.js"
                }
            }
        </script>

        <script type="module">
            import prettyMs from "prettyMs";
            import { compile as svelteCompiler } from "https://cdn.jsdelivr.net/npm/svelte@5.53.9/compiler/index.js/+esm";

            import { example, benchmarkExample } from "./example.js";

            let compiler = null;
            try {
                const wasm = await import("./compiler/wasm_compiler.js");
                await wasm.default();
                compiler = new wasm.WasmCompiler();
                try { compiler.compile("<div></div>"); } catch (_) {}
            } catch (e) {
                console.warn("WASM compiler not available:", e);
            }

            let editorInstance;
            let diffEditorInstance;
            let originalModel;
            let modifiedModel;

            const rustPerf = document.getElementById("rust-perf");
            const sveltePerf = document.getElementById("svelte-perf");

            // --- Theme ---
            const themeToggleBtn = document.getElementById("theme-toggle");
            let isDark = localStorage.getItem("theme") === "dark" ||
                (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches);

            function applyTheme() {
                document.documentElement.classList.toggle("dark", isDark);
                themeToggleBtn.textContent = isDark ? "\u2600\uFE0F" : "\uD83C\uDF19";
                if (typeof monaco !== "undefined") {
                    monaco.editor.setTheme(isDark ? "vs-dark" : "vs");
                }
            }

            applyTheme();

            themeToggleBtn.addEventListener("click", () => {
                isDark = !isDark;
                localStorage.setItem("theme", isDark ? "dark" : "light");
                applyTheme();
            });

            // --- Benchmark button ---
            document.getElementById("load-benchmark").addEventListener("click", () => {
                if (editorInstance) {
                    editorInstance.setValue(benchmarkExample);
                }
            });

            // --- Monaco ---
            let scriptElement = document.createElement("script");
            scriptElement.setAttribute(
                "src",
                "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.40.0/min/vs/loader.min.js",
            );
            document.body.appendChild(scriptElement);

            scriptElement.addEventListener("load", () => {
                require.config({
                    paths: {
                        vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.40.0/min/vs",
                    },
                });

                require(["vs/editor/editor.main"], () => {
                    const monacoTheme = isDark ? "vs-dark" : "vs";

                    editorInstance = monaco.editor.create(
                        document.getElementById("editor"),
                        {
                            value: example,
                            language: "html",
                            automaticLayout: true,
                            padding: { top: 5, right: 5, bottom: 5, left: 5 },
                            overviewRulerLanes: 0,
                            overviewRulerBorder: false,
                            minimap: { enabled: false },
                            theme: monacoTheme,
                        },
                    );

                    originalModel = monaco.editor.createModel("", "javascript");
                    modifiedModel = monaco.editor.createModel("", "javascript");

                    const isNarrow = window.innerWidth < 768;

                    diffEditorInstance = monaco.editor.createDiffEditor(
                        document.getElementById("diff-editor"),
                        {
                            automaticLayout: true,
                            readOnly: true,
                            renderSideBySide: !isNarrow,
                            minimap: { enabled: false },
                            overviewRulerLanes: 0,
                            theme: monacoTheme,
                            originalEditable: false,
                        },
                    );

                    diffEditorInstance.setModel({
                        original: originalModel,
                        modified: modifiedModel,
                    });

                    window.addEventListener("resize", () => {
                        diffEditorInstance.updateOptions({
                            renderSideBySide: window.innerWidth >= 768,
                        });
                    });

                    editorInstance.onDidChangeModelContent(() => {
                        setTimeout(compileRust);
                        setTimeout(compileSvelte);
                        setTimeout(compare);
                    });

                    setTimeout(compileRust);
                    setTimeout(compileSvelte);
                    setTimeout(compare);
                });
            });

            function compare() {
                const status = document.getElementById("status");

                if (originalModel.getValue() === modifiedModel.getValue()) {
                    status.textContent = "\u2705";
                } else {
                    status.textContent = "\u26A0\uFE0F";
                }
            }

            function compileRust() {
                if (!compiler) {
                    modifiedModel.setValue(
                        "WASM compiler not available.\n" +
                        "Run: wasm-pack build --target web ./crates/wasm_compiler -d ../../docs/compiler"
                    );
                    rustPerf.textContent = "n/a";
                    return;
                }
                try {
                    const source = editorInstance.getValue();
                    const result = checkPerformance(
                        rustPerf,
                        () => compiler.compile(source),
                        "rust",
                    );

                    if (result.js) {
                        modifiedModel.setValue(result.js);
                    } else {
                        modifiedModel.setValue("// compilation failed");
                    }

                    // Show diagnostics as Monaco markers
                    const model = editorInstance.getModel();
                    if (result.diagnostics && result.diagnostics.length > 0) {
                        const markers = result.diagnostics.map(d => ({
                            severity: d.severity === "Error"
                                ? monaco.MarkerSeverity.Error
                                : monaco.MarkerSeverity.Warning,
                            startLineNumber: d.start_line + 1,
                            startColumn: d.start_col + 1,
                            endLineNumber: d.end_line + 1,
                            endColumn: d.end_col + 1,
                            message: d.message,
                        }));
                        monaco.editor.setModelMarkers(model, "svelte-rust", markers);
                    } else {
                        monaco.editor.setModelMarkers(model, "svelte-rust", []);
                    }
                } catch (e) {
                    console.error(e);
                    modifiedModel.setValue("// compilation failed");
                    if (editorInstance) {
                        monaco.editor.setModelMarkers(editorInstance.getModel(), "svelte-rust", []);
                    }
                }
            }

            function compileSvelte() {
                try {
                    const source = editorInstance.getValue();
                    const result = checkPerformance(
                        sveltePerf,
                        () =>
                            svelteCompiler(source, {
                                discloseVersion: false,
                                dev: false,
                                name: "App",
                                modernAst: true,
                                runes: true,
                            }),
                        "svelte",
                    );

                    const code = compiler ? compiler.format(result.js.code) : result.js.code;
                    originalModel.setValue(code);
                } catch (e) {
                    console.error(e);
                    originalModel.setValue("Compiler error");
                }
            }

            function checkPerformance(element, fn, label) {
                const start = performance.now();

                const result = fn();

                const end = performance.now();
                const span = end - start;

                console.log(label, { start, end, span });

                element.textContent = `${prettyMs(span, {
                    formatSubMilliseconds: true,
                })}`;

                return result;
            }
        </script>
    </body>
</html>
