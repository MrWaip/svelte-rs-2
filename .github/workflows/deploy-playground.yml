name: Deploy Playground

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  RUST_CHANNEL: 'nightly-2026-03-09'
  WASM_PACK_VERSION: '0.13.1'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: moonrepo/setup-rust@v1
        with:
          channel: ${{ env.RUST_CHANNEL }}
          targets: wasm32-unknown-unknown
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install wasm-pack
        run: cargo install wasm-pack --version ${{ env.WASM_PACK_VERSION }} --locked

      - name: Build WASM compiler
        run: wasm-pack build --target web ./crates/wasm_compiler -d ../../docs/compiler

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
