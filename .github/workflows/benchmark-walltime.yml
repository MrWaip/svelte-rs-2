name: CodSpeed (walltime)

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  RUST_CHANNEL: '1.94.1'

jobs:
  walltime:
    name: Walltime (Rust + Node)
    runs-on: codspeed-macro
    steps:
      - uses: actions/checkout@v4

      - name: Setup rust toolchain, cache and cargo-codspeed binary
        uses: moonrepo/setup-rust@v1
        with:
          channel: ${{ env.RUST_CHANNEL }}
          cache-target: release
          bins: cargo-codspeed
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Rust benchmarks
        run: cargo codspeed build --features codspeed -p benchmark

      - name: Install Node bench deps
        run: npm ci

      - name: Run benchmarks (Rust + Node)
        uses: CodSpeedHQ/action@v3
        with:
          run: cargo codspeed run && node tasks/benchmark/bench.mjs
          mode: walltime
          token: ${{ secrets.CODSPEED_TOKEN }}
